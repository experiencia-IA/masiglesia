<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Contactos - Gestor estilo Google</title>
    <!-- Tailwind CSS + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
            cursor: pointer;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 680px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            transform: scale(0.96);
            transition: transform 0.2s ease;
            cursor: default;
        }
        .modal-overlay.active .modal-container {
            transform: scale(1);
        }
        .badge-perfil {
            background-color: #eef2ff;
            color: #1e40af;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 999px;
            padding: 0.2rem 0.7rem;
            display: inline-block;
        }
        .foto-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
        }
        @media print {
            .no-print, button, .pagination-controls, .panel-superior, .search-box, .print-hide {
                display: none !important;
            }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; top: 0; left: 0; width: 100%; }
            table, th, td { border: 1px solid #ccc; border-collapse: collapse; }
        }
        .contact-row:hover { background-color: #fef9e3; }
        .link-phone, .link-email { text-decoration: none; transition: 0.2s; }
        .link-phone:hover, .link-email:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- PANEL SUPERIOR AZUL OSCURO -->
    <div class="panel-superior bg-blue-900 text-white shadow-lg sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-row items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-address-book text-2xl text-blue-200"></i>
                <h1 class="text-2xl md:text-3xl font-bold tracking-tight">CONTACTOS</h1>
                <span class="hidden sm:inline-block text-xs bg-blue-800 px-2 py-1 rounded-full" id="totalBadge">0</span>
            </div>
            <button id="btnNuevoContacto" class="bg-white text-blue-900 hover:bg-blue-50 font-semibold py-2 px-4 rounded-full shadow-md transition flex items-center gap-2 text-sm">
                <i class="fas fa-plus-circle"></i> Nuevo registro
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Búsqueda -->
        <div class="search-box mb-6">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Buscar por nombre, apellido, email o teléfono..." class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none bg-white">
            </div>
        </div>

        <!-- Botón imprimir sobre la tabla -->
        <div class="flex justify-end mb-3 print-hide">
            <button id="btnImprimirTablaPrincipal" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-5 rounded-full transition flex items-center gap-2 text-sm shadow-sm">
                <i class="fas fa-print"></i> Imprimir lista actual
            </button>
        </div>

        <!-- Tabla de contactos -->
        <div class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-5 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Apellido y Nombre</th>
                            <th class="px-5 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Perfil</th>
                            <th class="px-5 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Teléfono</th>
                            <th class="px-5 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="px-5 py-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaContactos" class="divide-y divide-gray-100 bg-white">
                        <tr><td colspan="5" class="text-center py-12 text-gray-400">Cargando contactos...</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- Paginación -->
            <div class="pagination-controls flex flex-col sm:flex-row justify-between items-center gap-4 px-4 py-4 bg-gray-50 border-t border-gray-200 print-hide">
                <div class="text-sm text-gray-600">
                    Mostrando <span id="desdeRegistro">0</span> - <span id="hastaRegistro">0</span> de <span id="totalRegistrosFiltrados">0</span> contactos
                </div>
                <div class="flex items-center gap-3">
                    <button id="btnPaginaAnterior" class="px-3 py-1 rounded-lg border bg-white text-gray-600 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed" disabled><i class="fas fa-chevron-left"></i> Anterior</button>
                    <span class="text-sm font-medium">Página <span id="paginaActual">1</span> de <span id="totalPaginas">1</span></span>
                    <button id="btnPaginaSiguiente" class="px-3 py-1 rounded-lg border bg-white text-gray-600 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">Siguiente <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL VER (detalles) -->
    <div id="viewModal" class="modal-overlay">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b px-6 py-4 bg-gray-50 rounded-t-2xl">
                <h2 class="text-xl font-semibold text-gray-800 flex items-center gap-2"><i class="fas fa-id-card text-blue-500"></i> Detalle del contacto</h2>
                <button class="closeModalBtn text-gray-400 hover:text-gray-600 text-2xl leading-5">&times;</button>
            </div>
            <div id="modalViewContent" class="p-6 space-y-4"></div>
            <div class="flex justify-between gap-3 px-6 py-5 bg-gray-50 rounded-b-2xl border-t">
                <button id="viewPrintBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 px-5 rounded-full transition flex items-center gap-2 text-sm"><i class="fas fa-print"></i> Imprimir contacto</button>
                <button id="viewEditBtn" class="bg-blue-100 hover:bg-blue-200 text-blue-700 font-medium py-2 px-5 rounded-full transition flex items-center gap-2 text-sm"><i class="fas fa-edit"></i> Editar</button>
                <button class="closeModalBtn bg-white border border-gray-300 hover:bg-gray-50 text-gray-600 font-medium py-2 px-5 rounded-full transition">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- MODAL FORM (Crear/Editar) con foto -->
    <div id="formModal" class="modal-overlay">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b px-6 py-4 bg-gray-50 rounded-t-2xl">
                <h2 id="formModalTitle" class="text-xl font-semibold text-gray-800"><i class="fas fa-user-plus mr-2 text-blue-500"></i>Nuevo contacto</h2>
                <button class="closeFormModalBtn text-gray-400 hover:text-gray-600 text-2xl leading-5">&times;</button>
            </div>
            <form id="contactForm" class="p-6 space-y-5">
                <input type="hidden" id="contactId" value="">
                <!-- Campo foto con previsualización -->
                <div class="flex flex-col sm:flex-row items-center gap-4 border-b pb-4 mb-2">
                    <div class="flex-shrink-0">
                        <img id="fotoPreview" class="foto-preview" src="https://ui-avatars.com/api/?background=1e3a8a&color=fff&rounded=true&bold=true&size=80" alt="Vista previa">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Foto de perfil</label>
                        <input type="file" id="fotoInput" accept="image/jpeg,image/png,image/jpg,image/webp" class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        <p class="text-xs text-gray-400 mt-1">Formatos: JPG, PNG, WEBP. Máx 2MB</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Apellido *</label><input type="text" id="lastName" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label><input type="text" id="firstName" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5"></div>
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Perfil *</label><select id="profile" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 bg-white">
                    <option value="Multiplicador">Multiplicador</option><option value="Pastor">Pastor</option><option value="Discipulador">Discipulador</option>
                    <option value="Plantador">Plantador</option><option value="Mentor">Mentor</option><option value="Nuevo Creyente">Nuevo Creyente</option><option value="Otros">Otros</option>
                </select></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Domicilio</label><input type="text" id="address" class="w-full border border-gray-300 rounded-xl px-4 py-2.5"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Teléfono (ej: +54 9 11 1234-5678)</label><input type="tel" id="phone" class="w-full border border-gray-300 rounded-xl px-4 py-2.5"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="email" class="w-full border border-gray-300 rounded-xl px-4 py-2.5"></div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" class="closeFormModalBtn bg-white border border-gray-300 px-5 py-2.5 rounded-xl">Cancelar</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl shadow-sm">Guardar contacto</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ---------- DATOS ----------
        let contactos = [];
        const STORAGE_KEY = 'google_contacts_app_v4';
        let filtroTexto = "";
        let paginaActual = 1;
        const REGISTROS_POR_PAGINA = 15;

        function guardarEnLocalStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(contactos)); }

        function cargarDatosIniciales() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) contactos = JSON.parse(stored);
            else {
                contactos = [
                    { id: Date.now()+1, lastName:"Pérez", firstName:"Juan", profile:"Pastor", address:"Av. Corrientes 1234, CABA", phone:"+54 9 11 2345-6789", email:"juan.perez@iglesia.org", foto: null },
                    { id: Date.now()+2, lastName:"Gómez", firstName:"María", profile:"Multiplicador", address:"Belgrano 567, Córdoba", phone:"+54 9 351 1234567", email:"maria.gomez@ministerio.com", foto: null },
                    { id: Date.now()+3, lastName:"Rodríguez", firstName:"David", profile:"Discipulador", address:"San Martín 890, Mendoza", phone:"261 555-1234", email:"david.rodriguez@fe.org", foto: null },
                    { id: Date.now()+4, lastName:"López", firstName:"Ana", profile:"Mentor", address:"Rivadavia 234, Rosario", phone:"+54 341 9876543", email:"ana.lopez@discipulado.com", foto: null },
                    { id: Date.now()+5, lastName:"Martínez", firstName:"Carlos", profile:"Nuevo Creyente", address:"9 de Julio 432, Tucumán", phone:"+54 9 381 123456", email:"carlos.mtz@fe.org", foto: null },
                ];
                guardarEnLocalStorage();
            }
            actualizarTodo();
        }

        function getContactosFiltrados() {
            if (!filtroTexto.trim()) return [...contactos];
            const term = filtroTexto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            return contactos.filter(c => 
                (c.firstName + " " + c.lastName).toLowerCase().includes(term) ||
                c.lastName.toLowerCase().includes(term) ||
                c.firstName.toLowerCase().includes(term) ||
                (c.phone && c.phone.toLowerCase().includes(term)) ||
                (c.email && c.email.toLowerCase().includes(term))
            );
        }

        function getContactosPaginados() {
            const filtrados = getContactosFiltrados();
            const total = filtrados.length;
            const totalPaginas = Math.max(1, Math.ceil(total / REGISTROS_POR_PAGINA));
            if (paginaActual > totalPaginas) paginaActual = totalPaginas;
            const inicio = (paginaActual - 1) * REGISTROS_POR_PAGINA;
            const fin = inicio + REGISTROS_POR_PAGINA;
            return { datos: filtrados.slice(inicio, fin), total, totalPaginas, inicio, fin };
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        function actualizarTabla() {
            const { datos, total, totalPaginas, inicio, fin } = getContactosPaginados();
            const tbody = document.getElementById("tablaContactos");
            if (datos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-400"><i class="fas fa-user-slash text-3xl mb-2 block"></i> No hay contactos coincidentes</td></tr>`;
            } else {
                let html = "";
                for (const c of datos) {
                    const nombreCompleto = `${c.lastName}, ${c.firstName}`;
                    const phoneLink = c.phone ? `<a href="tel:${encodeURIComponent(c.phone.replace(/\s/g, ''))}" class="link-phone text-blue-700 hover:text-blue-900 flex items-center gap-1"><i class="fas fa-phone-alt text-xs"></i> ${escapeHtml(c.phone)}</a>` : '—';
                    const emailLink = c.email ? `<a href="mailto:${encodeURIComponent(c.email)}" class="link-email text-blue-700 hover:text-blue-900 flex items-center gap-1"><i class="fas fa-envelope text-xs"></i> ${escapeHtml(c.email)}</a>` : '—';
                    html += `
                        <tr class="contact-row hover:bg-gray-50 transition">
                            <td class="px-5 py-4 whitespace-nowrap"><span class="font-medium text-gray-800">${escapeHtml(nombreCompleto)}</span></td>
                            <td class="px-5 py-4 whitespace-nowrap"><span class="badge-perfil">${escapeHtml(c.profile)}</span></td>
                            <td class="px-5 py-4 whitespace-nowrap">${phoneLink}</td>
                            <td class="px-5 py-4 whitespace-nowrap">${emailLink}</td>
                            <td class="px-5 py-4 whitespace-nowrap text-center">
                                <div class="flex justify-center gap-2">
                                    <button onclick="verContacto('${c.id}')" class="text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 p-2 rounded-full transition" title="Ver"><i class="fas fa-eye"></i></button>
                                    <button onclick="editarContacto('${c.id}')" class="text-amber-600 hover:text-amber-800 bg-amber-50 hover:bg-amber-100 p-2 rounded-full transition" title="Editar"><i class="fas fa-pen"></i></button>
                                    <button onclick="borrarContacto('${c.id}')" class="text-red-600 hover:text-red-800 bg-red-50 hover:bg-red-100 p-2 rounded-full transition" title="Borrar"><i class="fas fa-trash-alt"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
                tbody.innerHTML = html;
            }
            document.getElementById("desdeRegistro").innerText = total === 0 ? 0 : inicio + 1;
            document.getElementById("hastaRegistro").innerText = Math.min(fin, total);
            document.getElementById("totalRegistrosFiltrados").innerText = total;
            document.getElementById("paginaActual").innerText = paginaActual;
            document.getElementById("totalPaginas").innerText = totalPaginas;
            document.getElementById("btnPaginaAnterior").disabled = paginaActual === 1;
            document.getElementById("btnPaginaSiguiente").disabled = paginaActual === totalPaginas;
            document.getElementById("totalBadge").innerText = `${contactos.length} total`;
        }

        function actualizarTodo() { actualizarTabla(); }

        // ---------- MODALES ----------
        function cerrarModalView() { document.getElementById("viewModal").classList.remove("active"); currentViewContactId = null; }
        function cerrarModalForm() { document.getElementById("formModal").classList.remove("active"); }

        function setupModalClosing() {
            const viewOverlay = document.getElementById("viewModal");
            const formOverlay = document.getElementById("formModal");
            viewOverlay.addEventListener("click", function(e) { if (e.target === viewOverlay) cerrarModalView(); });
            formOverlay.addEventListener("click", function(e) { if (e.target === formOverlay) cerrarModalForm(); });
            document.querySelectorAll(".closeModalBtn").forEach(btn => btn.addEventListener("click", cerrarModalView));
            document.querySelectorAll(".closeFormModalBtn").forEach(btn => btn.addEventListener("click", cerrarModalForm));
        }

        let currentViewContactId = null;
        function verContacto(id) {
            const c = contactos.find(c => c.id == id);
            if (!c) return;
            currentViewContactId = c.id;
            const modal = document.getElementById("viewModal");
            const divContent = document.getElementById("modalViewContent");
            // Construir HTML con foto si existe
            const fotoHtml = c.foto ? `<img src="${c.foto}" class="w-24 h-24 rounded-full object-cover border-2 border-blue-200 mx-auto mb-2">` : `<div class="w-24 h-24 rounded-full bg-blue-100 flex items-center justify-center mx-auto mb-2"><i class="fas fa-user fa-3x text-blue-400"></i></div>`;
            divContent.innerHTML = `
                <div class="bg-gray-50 rounded-xl p-4 space-y-3">
                    <div class="text-center">
                        ${fotoHtml}
                        <h3 class="text-2xl font-bold mt-2">${escapeHtml(c.lastName)}, ${escapeHtml(c.firstName)}</h3>
                        <span class="badge-perfil mt-1 inline-block">${escapeHtml(c.profile)}</span>
                    </div>
                    <div class="grid gap-2 mt-4">
                        ${c.address ? `<div><i class="fas fa-home w-5 text-gray-500 mr-2"></i> ${escapeHtml(c.address)}</div>` : ''}
                        ${c.phone ? `<div><i class="fas fa-phone-alt w-5 text-gray-500 mr-2"></i><a href="tel:${c.phone.replace(/\s/g,'')}" class="text-blue-600 hover:underline">${escapeHtml(c.phone)}</a></div>` : ''}
                        ${c.email ? `<div><i class="fas fa-envelope w-5 text-gray-500 mr-2"></i><a href="mailto:${c.email}" class="text-blue-600 hover:underline">${escapeHtml(c.email)}</a></div>` : ''}
                    </div>
                </div>
            `;
            modal.classList.add("active");
        }

        function imprimirContactoActual() {
            if (!currentViewContactId) return;
            const c = contactos.find(c => c.id == currentViewContactId);
            if (!c) return;
            const fotoBase64 = c.foto ? `<img src="${c.foto}" style="width:100px; border-radius:50%; margin-bottom:10px;">` : '';
            const contenido = `
                <html><head><title>Contacto</title><style>body{font-family:sans-serif;padding:2rem;} .card{border:1px solid #ccc;border-radius:20px;padding:1.5rem;text-align:center;}</style></head>
                <body><div class="card">${fotoBase64}<h2>${c.lastName}, ${c.firstName}</h2><p><strong>Perfil:</strong> ${c.profile}</p><p><strong>Domicilio:</strong> ${c.address || '—'}</p><p><strong>Teléfono:</strong> ${c.phone || '—'}</p><p><strong>Email:</strong> ${c.email || '—'}</p></div></body></html>
            `;
            const win = window.open('', '_blank');
            win.document.write(contenido);
            win.document.close();
            win.print();
        }

        function editarDesdeView() { if(currentViewContactId) { cerrarModalView(); editarContacto(currentViewContactId); } }

        // ---------- MANEJO DE FOTO (base64) ----------
        let fotoTempBase64 = null;
        function handleFotoSeleccionada(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                fotoTempBase64 = e.target.result;
                const preview = document.getElementById("fotoPreview");
                preview.src = fotoTempBase64;
            };
            reader.readAsDataURL(file);
        }

        function resetFormularioFoto() {
            fotoTempBase64 = null;
            document.getElementById("fotoPreview").src = "https://ui-avatars.com/api/?background=1e3a8a&color=fff&rounded=true&bold=true&size=80";
            document.getElementById("fotoInput").value = "";
        }

        function abrirFormModal(contactoId = null) {
            const modal = document.getElementById("formModal");
            const title = document.getElementById("formModalTitle");
            document.getElementById("contactForm").reset();
            document.getElementById("contactId").value = "";
            resetFormularioFoto();
            if (contactoId) {
                const c = contactos.find(c => c.id == contactoId);
                if (c) {
                    title.innerHTML = `<i class="fas fa-edit mr-2"></i>Editar contacto`;
                    document.getElementById("contactId").value = c.id;
                    document.getElementById("lastName").value = c.lastName;
                    document.getElementById("firstName").value = c.firstName;
                    document.getElementById("profile").value = c.profile;
                    document.getElementById("address").value = c.address || "";
                    document.getElementById("phone").value = c.phone || "";
                    document.getElementById("email").value = c.email || "";
                    if (c.foto) {
                        fotoTempBase64 = c.foto;
                        document.getElementById("fotoPreview").src = c.foto;
                    } else {
                        document.getElementById("fotoPreview").src = "https://ui-avatars.com/api/?background=1e3a8a&color=fff&rounded=true&bold=true&size=80";
                    }
                } else return;
            } else title.innerHTML = `<i class="fas fa-user-plus mr-2"></i>Nuevo contacto`;
            modal.classList.add("active");
        }

        function guardarContacto(e) {
            e.preventDefault();
            const id = document.getElementById("contactId").value;
            const lastName = document.getElementById("lastName").value.trim();
            const firstName = document.getElementById("firstName").value.trim();
            if (!lastName || !firstName) return alert("Apellido y nombre son obligatorios.");
            const profile = document.getElementById("profile").value;
            const address = document.getElementById("address").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const email = document.getElementById("email").value.trim();
            const foto = fotoTempBase64; // puede ser null o base64
            if (id) {
                const idx = contactos.findIndex(c => c.id == id);
                if (idx !== -1) contactos[idx] = { ...contactos[idx], lastName, firstName, profile, address, phone, email, foto };
            } else {
                contactos.push({ id: Date.now(), lastName, firstName, profile, address, phone, email, foto });
            }
            guardarEnLocalStorage();
            paginaActual = 1;
            actualizarTodo();
            cerrarModalForm();
        }

        function editarContacto(id) { abrirFormModal(id); }
        function borrarContacto(id) {
            if(confirm("¿Eliminar contacto permanentemente?")) {
                contactos = contactos.filter(c => c.id != id);
                guardarEnLocalStorage();
                const filtrados = getContactosFiltrados();
                const totalPaginas = Math.ceil(filtrados.length / REGISTROS_POR_PAGINA);
                if(paginaActual > totalPaginas && totalPaginas > 0) paginaActual = totalPaginas;
                else if(filtrados.length === 0) paginaActual = 1;
                actualizarTodo();
                if(currentViewContactId == id) cerrarModalView();
            }
        }

        function imprimirTablaCompleta() {
            const filtrados = getContactosFiltrados();
            if(filtrados.length === 0) return alert("No hay contactos para imprimir.");
            let filas = "";
            filtrados.forEach(c => {
                filas += `<tr><td>${c.lastName}, ${c.firstName}</td><td>${c.profile}</td><td>${c.phone || '—'}</td><td>${c.email || '—'}</td><td>${c.address || '—'}</td></tr>`;
            });
            const printHtml = `<html><head><title>Contactos</title><style>table, th, td{border:1px solid #aaa; border-collapse:collapse; padding:8px;} th{background:#f0f0f0;}</style></head><body><h2>Lista de contactos</h2><p>Total: ${filtrados.length}</p><table><thead><tr><th>Nombre</th><th>Perfil</th><th>Teléfono</th><th>Email</th><th>Domicilio</th></tr></thead><tbody>${filas}</tbody></table></body></html>`;
            const win = window.open('', '_blank');
            win.document.write(printHtml);
            win.document.close();
            win.print();
        }

        // Eventos de interfaz
        function setupEventListeners() {
            document.getElementById("searchInput").addEventListener("input", (e) => {
                filtroTexto = e.target.value;
                paginaActual = 1;
                actualizarTabla();
            });
            document.getElementById("btnNuevoContacto").addEventListener("click", () => abrirFormModal(null));
            document.getElementById("btnImprimirTablaPrincipal").addEventListener("click", imprimirTablaCompleta);
            document.getElementById("viewPrintBtn").addEventListener("click", imprimirContactoActual);
            document.getElementById("viewEditBtn").addEventListener("click", editarDesdeView);
            document.getElementById("contactForm").addEventListener("submit", guardarContacto);
            document.getElementById("btnPaginaAnterior").addEventListener("click", () => { if(paginaActual > 1) { paginaActual--; actualizarTabla(); } });
            document.getElementById("btnPaginaSiguiente").addEventListener("click", () => { const totalPag = Math.ceil(getContactosFiltrados().length / REGISTROS_POR_PAGINA); if(paginaActual < totalPag) { paginaActual++; actualizarTabla(); } });
            document.getElementById("fotoInput").addEventListener("change", (e) => {
                if (e.target.files && e.target.files[0]) handleFotoSeleccionada(e.target.files[0]);
            });
        }

        function init() {
            cargarDatosIniciales();
            setupEventListeners();
            setupModalClosing();
        }
        init();
    </script>
</body>
</html>
